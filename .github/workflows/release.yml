name: Release Pack

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Download official miner
        run: |
          set -eux
          curl -L -o official.zip \
            https://github.com/Keryx-Labs/keryx-miner/releases/download/v0.3.7-OPoI/keryx-miner-v0.3.7-OPoI-linux-gnu-amd64.zip
          mkdir official pack
          unzip -q official.zip -d official
          MINER_DIR="$(dirname "$(find official -type f -name keryx-miner | head -1)")"
          cp "$MINER_DIR"/* pack/
          cp run-light.sh download-light-model.sh README.md pack/
          chmod +x pack/keryx-miner pack/*.sh

      - name: Package
        run: |
          cd pack
          zip -r ../keryx-5090-miner-pack-linux-amd64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-5090-miner-pack-linux-amd64
          path: keryx-5090-miner-pack-linux-amd64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: keryx-5090-miner-pack-linux-amd64.zip

