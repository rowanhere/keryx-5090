name: Custom Miner Release

on:
  workflow_dispatch:
  push:
    tags:
      - "custom-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build patched miner
        shell: bash
        run: |
          set -eux
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            nvidia/cuda:12.8.1-devel-ubuntu24.04 \
            bash -lc '
              set -eux
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                ca-certificates \
                curl \
                git \
                build-essential \
                pkg-config \
                libssl-dev \
                protobuf-compiler \
                clang \
                cmake \
                unzip \
                zip
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              export PATH="$HOME/.cargo/bin:$PATH"
              rustc --version
              cargo --version
              nvcc --version

              rm -rf miner-src
              git clone https://github.com/Keryx-Labs/keryx-miner.git miner-src
              cd miner-src
              git checkout v0.3.7-OPoI
              git apply ../patches/pom-gpu-loop-optimization.patch
              cargo build --release
            '

      - name: Package
        shell: bash
        run: |
          set -eux
          mkdir -p pack
          cp miner-src/target/release/keryx-miner pack/
          find miner-src/target/release -maxdepth 1 -type f -name 'libkeryx*.so' -exec cp {} pack/ \;
          cp run-light.sh run-light-max.sh autotune-light.sh optimize-gpus.sh download-light-model.sh README.md pack/
          chmod +x pack/keryx-miner pack/*.sh
          cd pack
          zip -r ../keryx-5090-custom-miner-linux-amd64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-5090-custom-miner-linux-amd64
          path: keryx-5090-custom-miner-linux-amd64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: keryx-5090-custom-miner-linux-amd64.zip
