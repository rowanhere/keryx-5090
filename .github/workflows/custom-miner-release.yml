name: Custom Miner Release

on:
  workflow_dispatch:
  push:
    tags:
      - "custom-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Build patched miner
        shell: bash
        run: |
          set -eux
          docker run --rm \
            -v "$PWD:/work" \
            -w /work \
            nvidia/cuda:12.8.1-devel-ubuntu24.04 \
            bash -lc '
              set -eux
              apt-get update
              DEBIAN_FRONTEND=noninteractive apt-get install -y \
                ca-certificates \
                curl \
                git \
                build-essential \
                pkg-config \
                libssl-dev \
                protobuf-compiler \
                clang \
                cmake \
                unzip \
                zip
              curl https://sh.rustup.rs -sSf | sh -s -- -y --profile minimal
              export PATH="$HOME/.cargo/bin:$PATH"
              export CARGO_PROFILE_RELEASE_LTO=false
              export CARGO_PROFILE_RELEASE_CODEGEN_UNITS=16
              rustc --version
              cargo --version
              nvcc --version

              rm -rf miner-src
              git clone https://github.com/Keryx-Labs/keryx-miner.git miner-src
              cd miner-src
              git checkout v0.3.7-OPoI
              git apply ../patches/pom-gpu-loop-optimization.patch
              git apply ../patches/pom-sm120-kernel.patch
              printf "\n[profile.fast-release]\n" >> Cargo.toml
              printf "inherits = \"release\"\n" >> Cargo.toml
              printf "lto = false\n" >> Cargo.toml
              printf "codegen-units = 32\n" >> Cargo.toml
              printf "incremental = true\n" >> Cargo.toml
              printf "debug = 0\n" >> Cargo.toml
              printf "strip = \"symbols\"\n" >> Cargo.toml
              cargo build --profile fast-release -p keryx-miner -p keryxcuda --timings
            '

      - name: Package
        shell: bash
        run: |
          set -eux
          curl -L -o official.zip \
            https://github.com/Keryx-Labs/keryx-miner/releases/download/v0.3.7-OPoI/keryx-miner-v0.3.7-OPoI-linux-gnu-amd64.zip
          rm -rf official
          mkdir official
          unzip -q official.zip -d official
          OFFICIAL_DIR="$(dirname "$(find official -type f -name keryx-miner | head -1)")"

          mkdir -p pack
          cp "$OFFICIAL_DIR"/* pack/
          # Rust trait-object plugin ABI is build-specific. Never pair the rebuilt executable
          # with plugins from the official binary release.
          rm -f pack/libkeryxcuda.so pack/libkeryxopencl.so
          cp miner-src/target/fast-release/keryx-miner pack/
          cp miner-src/target/fast-release/libkeryxcuda.so pack/
          if [ -f miner-src/target/fast-release/libkeryx-llama.so ]; then
            cp miner-src/target/fast-release/libkeryx-llama.so pack/
          fi
          cp run-light.sh run-light-max.sh autotune-light.sh autotune-pom.sh optimize-gpus.sh download-light-model.sh README.md pack/
          chmod +x pack/keryx-miner pack/*.sh
          cd pack
          zip -r ../keryx-5090-custom-miner-linux-amd64.zip .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: keryx-5090-custom-miner-linux-amd64
          path: keryx-5090-custom-miner-linux-amd64.zip

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: keryx-5090-custom-miner-linux-amd64.zip
